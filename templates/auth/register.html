{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/cal.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}">
{% endblock head %}

{% block body %}
<form method="POST", id="new-user-reg">
    <div class="form-box">
        <h3>Register User</h3>
        <input type="text" name="first-name" placeholder="Name">
        <input type="text" name="last-name" placeholder="Lastname">
        <input type="text" name="username" placeholder="Username">
        <input type="text" name="email" placeholder="Email">
        <input type="password" name="password" placeholder="Password">
        <input type="password" name="confirm-password" placeholder="Confirm Password">
        <div class="button-center">
        <button id="reg-btn" type="submit">Register</button>
        </div>
    </div>
</form>
{% endblock body %}
